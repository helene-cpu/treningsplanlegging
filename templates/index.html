{% extends "base.html" %}

{% block content %}
<h1>Logg inn</h1>
<form method="POST">
    {{ form.hidden_tag() }}
    {{ form.username.label }}{{ form.username }}<br>
    {{ form.password.label }}{{ form.password }}<br>
    {{ form.submit}}
</form>
<div class="register">
    <h2>Har du ikke en bruker?</h1>
    <a href="{{ url_for('register') }}">
        <button type="button">Opprett ny bruker</button>
    </a>

</div>
{% endblock %}
